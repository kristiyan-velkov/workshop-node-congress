# ========================================
# Docker Compose Configuration
# Modern Node.js Todo Application
# ========================================

services:
  # ========================================
  # PostgreSQL Database Service
  # ========================================
  db:
    image: postgres:16-alpine
    container_name: todoapp-db
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-todoapp}'
      POSTGRES_USER: '${POSTGRES_USER:-todoapp}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-todoapp_password}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - todoapp-network

  # ========================================
  # Application (Dockerfile)
  # ========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: todoapp:latest
    container_name: todoapp-app
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      PORT: '3000'
      POSTGRES_HOST: db
      POSTGRES_USER: '${POSTGRES_USER:-todoapp}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-todoapp_password}'
      POSTGRES_DB: '${POSTGRES_DB:-todoapp}'
      ALLOWED_ORIGINS: '${ALLOWED_ORIGINS:-http://localhost:${APP_PORT:-3000}}'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - todoapp-network

# ========================================
# Volume Configuration
# ========================================
volumes:
  postgres_data:
    name: todoapp-postgres-data
    driver: local

# ========================================
# Network Configuration
# ========================================
networks:
  todoapp-network:
    name: todoapp-network
    driver: bridge
